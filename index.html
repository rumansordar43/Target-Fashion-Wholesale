    <script>
      // Defensive script to prevent "Cannot set property fetch" error
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Attempted to overwrite window.fetch. Ignoring to prevent TypeError.');
              },
              configurable: true
            });
          }
        } catch (e) {
          console.error('Error setting up fetch guard:', e);
        }
      })();
    </script>
