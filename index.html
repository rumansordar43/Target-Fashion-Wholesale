    <script>
      // Fix for "Cannot set property fetch" error
      (function() {
        try {
          var win = window;
          var originalFetch = win.fetch;
          
          // Check if fetch is already defined as a getter-only property
          var desc = Object.getOwnPropertyDescriptor(win, 'fetch');
          
          if (desc && (!desc.writable || !desc.set) && desc.configurable) {
            // Redefine it to be writable so third-party scripts can overwrite it if they must
            Object.defineProperty(win, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Fallback: if we can't redefine it, at least try to catch the error 
          // when other scripts try to set it, though this is harder to do globally.
          console.warn('Fetch property is read-only and could not be redefined:', e);
        }
      })();
    </script>
